trigger:
  branches:
    include:
      - main

variables:
  GCP_PROJECT: 'platform-eng-1777467808'
  GCP_REGION: 'europe-west1'
  REGISTRY: 'europe-west1-docker.pkg.dev'
  REPOSITORY: 'dev-platform-docker'
  IMAGE_NAME: 'api-service'

stages:
  - stage: Test
    displayName: 'Test Services'
    jobs:
      - job: TestApp
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: '20.x'
            displayName: 'Install Node.js'
          - script: |
              cd apps/api-service
              npm install
              npm test
            displayName: 'Run tests'

  - stage: Build
    displayName: 'Build & Push'
    dependsOn: Test
    jobs:
      - job: BuildPush
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - script: |
              docker build -t $(REGISTRY)/$(GCP_PROJECT)/$(REPOSITORY)/$(IMAGE_NAME):$(Build.BuildId) apps/api-service/
              echo "Image built successfully"
            displayName: 'Build Docker image'

  - stage: Deploy
    displayName: 'Deploy to GKE'
    dependsOn: Build
    jobs:
      - job: Deploy
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - script: |
              echo "Deploying $(IMAGE_NAME):$(Build.BuildId) to platform-cluster"
              echo "Region: $(GCP_REGION)"
            displayName: 'Deploy to GKE'
